name: Release

# Publishes whichever packages actually changed version when a `v*` tag is
# pushed (e.g. `v0.1.0`) — see scripts/publish-changed.mjs; a tag can bump
# just one package (e.g. a server-only patch) without failing on the other,
# already-published one. Requires an NPM_TOKEN repo secret (an npm token
# with publish rights to mcp-telemetry-sdk and mcp-telemetry-server) — this
# workflow does nothing until that secret is configured.

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # for npm provenance

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - run: npm test

      - name: Publish changed packages only
        run: node scripts/publish-changed.mjs
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_PUBLISH_PROVENANCE: 'true'
