name: Release

# Publishes both packages to npm when a `v*` tag is pushed (e.g. `v0.1.0`).
# Requires an NPM_TOKEN repo secret (an npm automation token with publish
# rights to the @mcp-telemetry scope) — this workflow does nothing until
# that secret is configured.

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # for npm provenance

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - run: npm test

      - run: npm publish --workspaces --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
